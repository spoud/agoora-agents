# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Explicit coordinate matching ensures the BOM itself is evaluated
      quarkus-platform:
        patterns:
          - "io.quarkus.platform:quarkus-bom"
          - "io.quarkus:*"
          - "io.quarkus.platform:*"
      utility-dependencies:
        exclude-patterns:
          - "io.quarkus:*"
          - "io.quarkus.platform:*"
          - "io.quarkus.platform:quarkus-bom"
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/agoora-kafka-agent"
    schedule:
      interval: "weekly"
    groups:
      docker-kafka-version:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/agoora-mqtt-agent"
    schedule:
      interval: "weekly"
    groups:
      docker-mqtt-version:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/agoora-openapi-agent"
    schedule:
      interval: "weekly"
    groups:
      docker-openapi-version:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/agoora-pgsql-agent"
    schedule:
      interval: "weekly"
    groups:
      docker-pgsql-version:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "/agoora-profiler-service"
    schedule:
      interval: "weekly"
    groups:
      docker-profiler-version:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
